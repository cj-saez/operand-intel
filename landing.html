<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#0f1117;color:#e2e8f0;-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;flex-direction:column;min-height:100vh;padding:40px 24px}
.logo-block{display:flex;align-items:center;gap:16px;margin-bottom:48px}

.logo-text span{color:#3b82f6}

.enter-btn svg{transition:transform .2s ease}
.enter-btn:hover svg{transform:translateX(3px)}
.divider{width:1px;height:40px;background:rgba(255,255,255,.08);margin:48px 0}
